name: Trigger Deployment
run-name: ${{ github.sha }}

on:
  push:
    branches:
      - main

jobs:
  call-deploy:
    uses: madhan-kumar-revature/deployment/.github/workflows/main.yml@main
    with:
      app_name: ${{ github.event.repository.name }}
      commit_sha: ${{ github.sha }}

  notify-deployment-repo:   # 👈 separate job
    runs-on: ubuntu-latest
    needs: call-deploy

    steps:
      - name: Trigger deployment repo (for visibility)
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/madhan-kumar-revature/deployment/dispatches \
            -d '{
              "event_type": "deploy",
              "client_payload": {
                "app_name": "${{ github.event.repository.name }}",
                "commit_sha": "${{ github.sha }}"
              }
            }'
