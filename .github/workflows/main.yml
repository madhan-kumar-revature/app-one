name: Trigger Deployment
run-name: ${{ github.sha }}

on:
  push:
    branches:
      - main

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deployment repo
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/madhan-kumar-revature/deployment/dispatches \
            -d '{
              "event_type": "deploy",
              "client_payload": {
                "app_name": "${{ github.event.repository.name }}",
                "commit_sha": "${{ github.sha }}",
                "deploy_dev": true,
                "deploy_qa": true
              }
            }'

      - name: Wait for workflow to start
        run: sleep 10

      - name: Get deployment run ID
        id: get_run
        run: |
          RUN_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            https://api.github.com/repos/madhan-kumar-revature/deployment/actions/runs \
            | jq -r '.workflow_runs[] | select(.head_sha=="'${{ github.sha }}'") | .id' | head -n 1)

          echo "RUN_ID=$RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Wait for deployment to complete
        run: |
          while true; do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
              https://api.github.com/repos/madhan-kumar-revature/deployment/actions/runs/$RUN_ID)

            STATUS=$(echo $RESPONSE | jq -r '.status')
            CONCLUSION=$(echo $RESPONSE | jq -r '.conclusion')

            echo "Status: $STATUS"

            if [ "$STATUS" == "completed" ]; then
              echo "Conclusion: $CONCLUSION"

              if [ "$CONCLUSION" != "success" ]; then
                echo "Deployment failed ❌"
                exit 1
              fi

              echo "Deployment succeeded ✅"
              break
            fi

            sleep 10
          done
